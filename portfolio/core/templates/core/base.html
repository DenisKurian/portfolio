<!DOCTYPE html>
<html lang="en" id="htmlTag">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}Portfolio{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Glidejs -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">



</head>

<style>
    html {
  scroll-padding-top: 125px; /* adjust this value to your navbar height */
}

  html {
    scroll-behavior: smooth;
  }

  .navbar .nav-link.active {
    font-weight: bold;
    color: #0dcaf0 !important;
  }
  .glide__bullet {
  background-color: #adb5bd;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin: 0 4px;
  opacity: 0.6;
  border: none;
  transition: all 0.3s;
}
.glide__bullet:hover,
.glide__bullet:focus,
.glide__bullet.glide__bullet--active {
  background-color: #0dcaf0;
  opacity: 1;
  transform: scale(1.2);
}
  .glide__arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 10;
    background: rgba(0, 0, 0, 0.6);
    border: none;
    color: white;
    padding: 12px 16px;
    border-radius: 50%;
    font-size: 20px;
  }
  .glide__arrow--left {
    left: -25px;
  }
  .glide__arrow--right {
    right: -25px;
  }

  .glide__bullets {
    display: flex;
    justify-content: center;
    gap: 10px;
  }
  .glide__bullet {
    width: 12px;
    height: 12px;
    background-color: #999;
    border-radius: 50%;
    border: none;
    transition: background-color 0.3s;
  }

  .glide__bullet:hover,
  .glide__bullet.glide__bullet--active {
    background-color: #0dcaf0;
  }



</style>

<!-- glidejs -->
<script src="https://cdn.jsdelivr.net/npm/@glidejs/glide"></script>

<body class="bg-body text-body" data-bs-spy="scroll" data-bs-target="#mainNavbar" data-bs-offset="100" tabindex="0">


<!-- AOS JS -->
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
  AOS.init();
</script>

<!-- Navbar -->
<nav id="mainNavbar" class="navbar navbar-expand-lg navbar-dark bg-dark px-3 fixed-top">

    <a class="navbar-brand" href="{% url 'home' %}">Portfolio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navLinks">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navLinks" >
        <ul class="navbar-nav ms-auto">
            <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
            <li class="nav-item"><a class="nav-link" href="#skills">Skills</a></li>
            <li class="nav-item"><a class="nav-link" href="#projects">Projects</a></li>
            <li class="nav-item"><a class="nav-link" href="#contact">Contact</a></li>
            <li class="nav-item">
            <button id="themeToggle" class="btn btn-outline-secondary btn-sm ms-2">🌙</button>
        </li>
        </ul>
        
        
</nav>

<!-- Main Content -->
<main class="container py-5 mt-5">
    {% block content %}{% endblock %}
</main>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>
<!-- Dark Mode Toggle Script -->
<script>
  const themeToggle = document.getElementById("themeToggle");
  const htmlTag = document.getElementById("htmlTag");

  // Load theme from localStorage
  const currentTheme = localStorage.getItem("theme") || "light";
  htmlTag.setAttribute("data-bs-theme", currentTheme);
  themeToggle.textContent = currentTheme === "dark" ? "☀️" : "🌙";

  // Toggle theme on click
  themeToggle.addEventListener("click", () => {
    const newTheme = htmlTag.getAttribute("data-bs-theme") === "dark" ? "light" : "dark";
    htmlTag.setAttribute("data-bs-theme", newTheme);
    localStorage.setItem("theme", newTheme);
    themeToggle.textContent = newTheme === "dark" ? "☀️" : "🌙";
  });
</script>
<!-- Glide.js -->
<script src="https://cdn.jsdelivr.net/npm/@glidejs/glide"></script>
<script>
  new Glide('.glide', {
    type: 'carousel',
    perView: 3,
    focusAt: 'center',
    gap: 16,
    breakpoints: {
      992: { perView: 2 },
      768: { perView: 1 }
    }
  }).mount();
</script>




</body>
</html>
